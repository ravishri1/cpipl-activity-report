name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'client/**'
      - '.github/workflows/ci-frontend.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'client/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16.x, 18.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'
    
    - name: Install frontend dependencies
      run: cd client && npm ci
    
    - name: Run ESLint
      run: cd client && npm run lint
      continue-on-error: true
    
    - name: Run unit tests
      run: cd client && npm test -- --coverage --watchAll=false
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.node-version == '18.x'
      with:
        file: ./client/coverage/coverage-final.json
        flags: frontend
        name: frontend-coverage
    
    - name: Build frontend
      run: cd client && npm run build
    
    - name: Check build output
      run: |
        if [ ! -d "client/dist" ]; then
          echo "Build failed: dist directory not created"
          exit 1
        fi
        echo "Build successful: $(du -sh client/dist | cut -f1)"
    
    - name: Archive build artifacts
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build-logs-${{ matrix.node-version }}
        path: client/
        retention-days: 7

  e2e-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'
    
    - name: Install client dependencies
      run: cd client && npm ci
    
    - name: Install server dependencies
      run: cd server && npm ci
    
    - name: Start backend server
      run: cd server && npm run dev &
      timeout-minutes: 2
    
    - name: Wait for backend
      run: |
        for i in {1..30}; do
          curl -f http://localhost:5000/health && break || sleep 1
        done
    
    - name: Start frontend server
      run: cd client && npm run dev &
      timeout-minutes: 2
    
    - name: Wait for frontend
      run: |
        for i in {1..30}; do
          curl -f http://localhost:3000 && break || sleep 1
        done
    
    - name: Run Cypress E2E tests
      run: cd client && npm run e2e
      timeout-minutes: 10
    
    - name: Upload Cypress videos
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: cypress-videos
        path: client/cypress/videos/
        retention-days: 7
    
    - name: Upload Cypress screenshots
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: cypress-screenshots
        path: client/cypress/screenshots/
        retention-days: 7

  accessibility-audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'
    
    - name: Install dependencies
      run: cd client && npm ci
    
    - name: Build for audit
      run: cd client && npm run build
    
    - name: Run axe accessibility audit
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    - name: Install axe-core
      run: npm install -g @axe-core/cli
    
    - name: Run accessibility tests
      run: cd client && npx jest --testPathPattern=accessibility --coverage=false || true

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    - name: Audit frontend dependencies
      run: cd client && npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Check for outdated packages
      run: cd client && npm outdated
      continue-on-error: true
