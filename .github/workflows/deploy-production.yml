name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      environment: ${{ steps.environment.outputs.env }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Extract version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        else
          VERSION="manual-deploy-$(date +%s)"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        fi
    
    - name: Determine environment
      id: environment
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
        else
          echo "env=production" >> $GITHUB_OUTPUT
        fi
    
    - name: Validate version format
      run: |
        VERSION=${{ steps.version.outputs.version }}
        if [[ ! $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] && [[ ! $VERSION =~ ^manual-deploy ]]; then
          echo "Invalid version format: $VERSION"
          exit 1
        fi

  test-before-deploy:
    needs: validate-release
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install all dependencies
      run: |
        cd server && npm ci
        cd ../client && npm ci
    
    - name: Run all tests
      run: |
        cd server && npm test
        cd ../client && npm test -- --watchAll=false
    
    - name: Build applications
      run: |
        cd client && npm run build
        cd ../server && npm run build --if-present
    
    - name: Verify builds
      run: |
        if [ ! -d "client/dist" ]; then
          echo "Frontend build failed"
          exit 1
        fi
        echo "✓ All builds successful"

  build-docker:
    needs: [validate-release, test-before-deploy]
    runs-on: ubuntu-latest
    if: success()
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./server
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/backend:${{ needs.validate-release.outputs.version }}
          ghcr.io/${{ github.repository }}/backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./client
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/frontend:${{ needs.validate-release.outputs.version }}
          ghcr.io/${{ github.repository }}/frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: [validate-release, build-docker]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.validate-release.outputs.environment }}
      url: https://app-${{ needs.validate-release.outputs.environment }}.example.com
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to ${{ needs.validate-release.outputs.environment }}
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        echo "Deploying version ${{ needs.validate-release.outputs.version }}"
        echo "Environment: ${{ needs.validate-release.outputs.environment }}"
        
        # Setup SSH
        mkdir -p ~/.ssh
        echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
        
        # Deploy
        ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST "cd $DEPLOY_PATH && ./deploy.sh ${{ needs.validate-release.outputs.version }}"
        
        # Cleanup
        rm ~/.ssh/deploy_key
    
    - name: Run smoke tests
      run: |
        echo "Running smoke tests on ${{ needs.validate-release.outputs.environment }}"
        for i in {1..30}; do
          curl -f https://app-${{ needs.validate-release.outputs.environment }}.example.com/health && break || sleep 2
        done

  notify-deployment:
    needs: [validate-release, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify deployment success
      if: needs.deploy.result == 'success'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.ref,
            environment: '${{ needs.validate-release.outputs.environment }}',
            description: 'Deployment of ${{ needs.validate-release.outputs.version }}',
            auto_merge: false,
            required_contexts: []
          });
    
    - name: Notify Slack success
      if: success() && secrets.SLACK_WEBHOOK
      uses: slackapi/slack-github-action@v1.24.0
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "✅ Deployment Successful",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*✅ Deployment Successful*\n*Version:* ${{ needs.validate-release.outputs.version }}\n*Environment:* ${{ needs.validate-release.outputs.environment }}\n*Repository:* ${{ github.repository }}"
                }
              }
            ]
          }
    
    - name: Notify Slack failure
      if: failure() && secrets.SLACK_WEBHOOK
      uses: slackapi/slack-github-action@v1.24.0
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "❌ Deployment Failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*❌ Deployment Failed*\n*Version:* ${{ needs.validate-release.outputs.version }}\n*Environment:* ${{ needs.validate-release.outputs.environment }}\n*See [logs](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})*"
                }
              }
            ]
          }

  create-release-notes:
    needs: [validate-release, deploy]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Generate changelog
      id: changelog
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -z "$PREV_TAG" ]; then
          COMMITS=$(git log --oneline)
        else
          COMMITS=$(git log --oneline $PREV_TAG..HEAD)
        fi
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.validate-release.outputs.version }}
        name: Release ${{ needs.validate-release.outputs.version }}
        body: |
          ## Changes
          ${{ steps.changelog.outputs.changelog }}
          
          ## Deployment
          - **Version:** ${{ needs.validate-release.outputs.version }}
          - **Environment:** ${{ needs.validate-release.outputs.environment }}
          - **Deployed at:** ${{ github.event.head_commit.timestamp }}
          
          ## Docker Images
          - Backend: `ghcr.io/${{ github.repository }}/backend:${{ needs.validate-release.outputs.version }}`
          - Frontend: `ghcr.io/${{ github.repository }}/frontend:${{ needs.validate-release.outputs.version }}`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
